# Create a ConfigMap via Transaction.
---
apiVersion: tx.janus.io/v1alpha1
kind: Transaction
metadata:
  name: create-configmap-txn
  namespace: default
spec:
  serviceAccountName: janus-txn
  sealed: true
---
apiVersion: tx.janus.io/v1alpha1
kind: ResourceChange
metadata:
  name: create-configmap-txn-new-config
  namespace: default
  ownerReferences:
    - apiVersion: tx.janus.io/v1alpha1
      kind: Transaction
      name: create-configmap-txn
      uid: FILL-IN-AFTER-TRANSACTION-CREATION
spec:
  target:
    apiVersion: v1
    kind: ConfigMap
    name: new-app-config
    namespace: default
  type: Create
  content:
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: new-app-config
      namespace: default
    data:
      database_url: "postgres://db:5432/myapp"
      log_level: "info"
