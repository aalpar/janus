# Demo teardown: removes all objects created by demo_nginx_setup.yaml
# and demo_nginx_txn.sh.
#
# This does NOT delete Transactions — they have a rollback-protection
# finalizer that must be removed first. Strip finalizers and delete
# transactions separately:
#
#   kubectl patch transaction nginx-patch --type=merge \
#     -p '{"metadata":{"finalizers":null}}' 2>/dev/null
#   kubectl delete transaction nginx-patch --ignore-not-found
#
# Usage:
#   kubectl delete -f demo_nginx_teardown.yaml --ignore-not-found
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: default
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nginx-data
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: janus-txn-edit
  namespace: default
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: janus-txn
  namespace: default
