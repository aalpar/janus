# Multi-operation Transaction: create, patch, and delete in a single transaction.
---
apiVersion: tx.janus.io/v1alpha1
kind: Transaction
metadata:
  name: multi-op-txn
  namespace: default
spec:
  serviceAccountName: janus-txn
  lockTimeout: 5m
  sealed: true
---
# 1. Create a new ConfigMap
apiVersion: tx.janus.io/v1alpha1
kind: ResourceChange
metadata:
  name: multi-op-txn-create-config
  namespace: default
  ownerReferences:
    - apiVersion: tx.janus.io/v1alpha1
      kind: Transaction
      name: multi-op-txn
      uid: FILL-IN-AFTER-TRANSACTION-CREATION
spec:
  target:
    apiVersion: v1
    kind: ConfigMap
    name: new-feature-config
    namespace: default
  type: Create
  content:
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: new-feature-config
      namespace: default
    data:
      enabled: "true"
---
# 2. Patch an existing ConfigMap
apiVersion: tx.janus.io/v1alpha1
kind: ResourceChange
metadata:
  name: multi-op-txn-patch-config
  namespace: default
  ownerReferences:
    - apiVersion: tx.janus.io/v1alpha1
      kind: Transaction
      name: multi-op-txn
      uid: FILL-IN-AFTER-TRANSACTION-CREATION
spec:
  target:
    apiVersion: v1
    kind: ConfigMap
    name: app-config
    namespace: default
  type: Patch
  order: 1
  content:
    data:
      version: "2.0"
---
# 3. Delete a stale ConfigMap
apiVersion: tx.janus.io/v1alpha1
kind: ResourceChange
metadata:
  name: multi-op-txn-delete-config
  namespace: default
  ownerReferences:
    - apiVersion: tx.janus.io/v1alpha1
      kind: Transaction
      name: multi-op-txn
      uid: FILL-IN-AFTER-TRANSACTION-CREATION
spec:
  target:
    apiVersion: v1
    kind: ConfigMap
    name: deprecated-config
    namespace: default
  type: Delete
  order: 2
