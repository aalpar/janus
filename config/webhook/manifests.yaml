---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-backup-janus-io-v1alpha1-transaction
  failurePolicy: Fail
  name: vtransaction-v1alpha1.kb.io
  rules:
  - apiGroups:
    - tx.janus.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - transactions
  sideEffects: None
