version: 2

builds:
  - id: janus
    binary: janus
    dir: ./cmd/janus
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X main.BuildVersion={{ .Tag }}

archives:
  - id: janus
    ids:
      - janus
    name_template: "janus-{{ .Tag }}-{{ .Os }}-{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  use: github-native

release:
  header: |
    ## Janus {{ .Tag }}
  footer: |
    **Full Changelog**: https://github.com/aalpar/janus/compare/{{ .PreviousTag }}...{{ .Tag }}
