{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "janus.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "janus.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  ports:
    - name: https
      port: 8443
      protocol: TCP
      targetPort: 8443
  selector:
    {{- include "janus.selectorLabels" . | nindent 4 }}
{{- end }}
