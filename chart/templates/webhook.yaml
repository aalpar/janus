{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "janus.webhookServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "janus.labels" . | nindent 4 }}
spec:
  ports:
    - port: 443
      protocol: TCP
      targetPort: 9443
  selector:
    {{- include "janus.selectorLabels" . | nindent 4 }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "janus.fullname" . }}-validating
  labels:
    {{- include "janus.labels" . | nindent 4 }}
  {{- if .Values.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "janus.certName" . }}
  {{- end }}
webhooks:
  - admissionReviewVersions: [v1]
    clientConfig:
      service:
        name: {{ include "janus.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-tx-janus-io-v1alpha1-resourcechange
    failurePolicy: Fail
    name: vresourcechange-v1alpha1.kb.io
    rules:
      - apiGroups: [tx.janus.io]
        apiVersions: [v1alpha1]
        operations: [CREATE, UPDATE]
        resources: [resourcechanges]
    sideEffects: None
  - admissionReviewVersions: [v1]
    clientConfig:
      service:
        name: {{ include "janus.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-tx-janus-io-v1alpha1-transaction
    failurePolicy: Fail
    name: vtransaction-v1alpha1.kb.io
    rules:
      - apiGroups: [tx.janus.io]
        apiVersions: [v1alpha1]
        operations: [CREATE, UPDATE]
        resources: [transactions]
    sideEffects: None
{{- end }}
